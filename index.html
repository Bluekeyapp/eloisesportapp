<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:#111;color:#f0f0f0;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-appearance:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;background:#111;overflow-x:hidden}

/* Views */
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  display:flex;background:rgba(17,17,17,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid #222;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:90}
.tab-bar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;
  font-size:10px;font-weight:600;color:#555;transition:color .15s}
.tab-bar button.on{color:#E8453F}
.tab-bar .ico{font-size:20px;line-height:1}

/* Header */
.head{padding:max(52px,env(safe-area-inset-top,52px)) 20px 16px}
.head h1{font-size:28px;font-weight:800;letter-spacing:-.5px}
.head h1 span{color:#E8453F}
.head p{font-size:13px;color:#666;margin-top:2px}

/* Phase Pills */
.phase-pills{display:flex;gap:6px;padding:0 20px;margin-bottom:16px}
.phase-pills button{padding:8px 16px;border-radius:99px;font-size:12px;font-weight:700;background:#1a1a1a;color:#666;transition:all .15s}
.phase-pills button.on{color:#fff}

/* Session Grid */
.sess-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:16px}
.sess-card{background:#1a1a1a;border-radius:14px;padding:14px;cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.sess-card:active{transform:scale(.97)}
.sess-card .day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sess-card .stitle{font-size:14px;font-weight:700;line-height:1.2}
.sess-card .bar{margin-top:8px;height:3px;border-radius:2px;background:#222;overflow:hidden}
.sess-card .bar-fill{height:100%;border-radius:2px;transition:width .3s}
.sess-card .cnt{font-size:10px;color:#555;margin-top:4px}

/* Workout */
.workout{padding:0 20px 120px}
.wk-head{padding-top:40px;margin-bottom:16px}
.wk-head.timer-push{padding-top:70px}
.back-btn{font-size:13px;color:#666;padding:4px 0;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px}
.wk-head h2{font-size:22px;font-weight:800}
.wk-head .sub{font-size:12px;color:#888;margin-top:2px}

.warm-box{background:#1a1a1a;border-radius:12px;padding:12px 14px;margin-bottom:14px;
  font-size:13px;color:#aaa;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.warm-box .wi{font-size:16px;flex-shrink:0}

/* Exercise Items */
.ex-item{background:#1a1a1a;border-radius:14px;margin-bottom:8px;overflow:hidden;transition:opacity .15s}
.ex-item.checked{opacity:.45}
.ex-row{display:flex;align-items:center;padding:12px 14px;gap:10px}
.ex-check{width:28px;height:28px;border-radius:8px;border:2px solid #333;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s;color:transparent}
.ex-check.on{border-color:#E8453F;background:#E8453F;color:#fff}
.ex-info{flex:1;min-width:0;cursor:pointer}
.ex-name{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{display:flex;gap:8px;flex-wrap:wrap}
.ex-meta span{font-size:11px;color:#888}
.ex-meta .accent{color:#E8453F;font-weight:700}
.ex-expand{padding:0 14px 12px;border-top:1px solid #222;display:none}
.ex-expand.open{display:block}
.ex-tip{font-size:13px;color:#999;line-height:1.5;padding-top:10px}
.rest-btn{margin-top:8px;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;transition:all .12s}
.rest-btn:active{transform:scale(.95)}

/* Timer Bar */
.timer-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(232,69,63,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:10px 20px;z-index:100;display:none;align-items:center;justify-content:space-between}
.timer-bar.active{display:flex}
.timer-bar .tt{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
.timer-bar .tl{font-size:12px;font-weight:600;opacity:.8}
.timer-bar .ts{padding:6px 14px;border-radius:8px;background:rgba(0,0,0,.3);font-size:12px;font-weight:700}

/* Finish Button */
.finish-btn{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);
  max-width:390px;padding:16px;border-radius:14px;font-size:15px;font-weight:800;text-align:center;z-index:80}
.finish-btn:active{transform:translateX(-50%) scale(.97)}

/* Done Screen */
.done-screen{text-align:center;padding:80px 20px}
.done-screen .big{font-size:60px;margin-bottom:16px}
.done-screen h2{font-size:24px;font-weight:800;margin-bottom:6px}
.done-screen p{font-size:14px;color:#888}
.done-screen button{margin-top:24px;padding:14px 32px;border-radius:14px;font-size:14px;font-weight:700;background:#E8453F;color:#fff}

/* Info Cards */
.info-section{padding:0 20px 100px}
.info-card{background:#1a1a1a;border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.info-card .ii{font-size:22px;flex-shrink:0}
.info-card h4{font-size:14px;font-weight:700;margin-bottom:2px}
.info-card p{font-size:12px;color:#888;line-height:1.4}

/* Progressions */
.prog-section{padding:0 20px 100px}
.prog-phase{margin-bottom:24px}
.prog-phase-title{font-size:14px;font-weight:700;margin-bottom:10px}
.prog-item{padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:13px;color:#ccc;line-height:1.4;display:flex;gap:8px;align-items:flex-start}
.prog-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}

/* History */
.hist-item{padding:10px 16px;background:#1a1a1a;border-radius:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.hist-item .hd{font-size:12px;color:#888}
.hist-item .hs{font-size:13px;font-weight:600}

.section-label{font-size:13px;font-weight:700;margin-bottom:10px}
.wk-label{padding:0 20px;margin-bottom:14px;font-size:12px;color:#666;font-weight:600}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Timer Bar -->
  <div class="timer-bar" id="timerBar">
    <div>
      <div class="tt" id="timerDisplay">0:00</div>
      <div class="tl">Temps de repos</div>
    </div>
    <button class="ts" onclick="stopTimer()">Annuler</button>
  </div>

  <!-- HOME -->
  <div class="view active" id="viewHome">
    <div class="head">
      <h1>GLUTE<span>LAB</span></h1>
      <p>Fessiers • Cuisses • Ventre plat</p>
    </div>
    <div class="phase-pills" id="phasePills"></div>
    <div class="wk-label" id="phaseWeeks"></div>
    <div class="sess-grid" id="sessGrid"></div>
  </div>

  <!-- WORKOUT -->
  <div class="view" id="viewWorkout">
    <div class="workout">
      <div class="wk-head" id="wkHead">
        <button class="back-btn" onclick="showView('home')">← Retour</button>
        <h2 id="wkTitle"></h2>
        <div class="sub" id="wkSub"></div>
      </div>
      <div class="warm-box" id="wkWarm"></div>
      <div id="exList"></div>
      <button class="finish-btn" id="finishBtn" onclick="finishSession()">Terminer la séance ✓</button>
    </div>
  </div>

  <!-- DONE -->
  <div class="view" id="viewDone">
    <div class="done-screen">
      <div class="big">🎉</div>
      <h2>Bravo !</h2>
      <p>Séance terminée et enregistrée.</p>
      <button onclick="resetAndHome()">Retour à l'accueil</button>
    </div>
  </div>

  <!-- PROGRESSIONS -->
  <div class="view" id="viewProg">
    <div class="head"><h1>Progressions</h1><p>Évolutions à appliquer toutes les 2 semaines</p></div>
    <div class="prog-section" id="progList"></div>
  </div>

  <!-- INFO -->
  <div class="view" id="viewInfo">
    <div class="head"><h1>Conseils</h1><p>Nutrition, récupération & matériel</p></div>
    <div class="info-section" id="infoContent"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tabBar">
    <button onclick="showView('home')" data-tab="home"><span class="ico">🏠</span>Séances</button>
    <button onclick="showView('prog')" data-tab="prog"><span class="ico">📈</span>Progrès</button>
    <button onclick="showView('info')" data-tab="info"><span class="ico">💡</span>Conseils</button>
  </div>
</div>

{n:"Enchaîné : Extension hanche",s:3,r:"15/jambe",w:"Élastique 30kg",rest:60,tip:"Repos après les 2 exos."},
{n:"Final : Pont fessier max",s:2,r:"Max 45s",w:"Élastique 30kg",rest:60,tip:"Tout donner. Dernière série = tout lâcher."}]},
{id:"d3",day:"Dim",title:"Cardio intense + Abdos",warm:"Mobilité dynamique complète",ex:[
{n:"EMOM 16 min",s:1,r:"Voir détail",w:"Varié",rest:0,tip:"Min 1: 10 balanciers | Min 2: 12 squats sautés | Min 3: 10 fentes sautées | Min 4: 10 burpees. ×4."},
{n:"Crunch inversé",s:3,r:"15",w:"—",rest:0,tip:"Enchaîner les 4 exos abdos sans repos."},
{n:"Rotation russe",s:3,r:"20",w:"Haltère 3kg",rest:0,tip:"Pieds décollés. Rotation contrôlée."},
{n:"Planche commando",s:3,r:"10",w:"—",rest:0,tip:"Bras tendus → avant-bras → bras tendus."},
{n:"Battements de jambes",s:3,r:"30s",w:"—",rest:60,tip:"Bas du dos au sol. Repos après le circuit."}]}],
prog:["Poussée hanches → max de charge (20kg+ sur le bassin)","Tous les squats → élastique 30kg systématique","Fentes bulgares → haltère 10kg + 4kg (14kg total)","Balancier → kettlebell 16kg si acheté","Ajouter 1-2 reps partout","Réduire TOUS les repos de 10-15s","Séance C → 3 exos enchaînés au lieu de 2","EMOM → passer à 18 ou 20 min"]}
];

const NUTR=[
{i:"🍗",t:"Protéines",d:"100-125g/jour — poulet, œufs, poisson, fromage blanc, whey"},
{i:"💧",t:"Eau",d:"2L minimum — 500ml avant, siroter pendant, 500ml après"},
{i:"🍠",t:"Glucides",d:"Patate douce, riz, avoine, fruits autour des séances"},
{i:"😴",t:"Sommeil",d:"7-9h par nuit — les muscles poussent au repos"},
{i:"🧘",t:"Récup",d:"1 jour d'étirements/yoga + rouleau de massage"}
];
const SHOP=[
{wk:"Semaine 5",item:"Haltères 6kg ×2 et 8kg ×2"},
{wk:"Semaine 9",item:"Haltères 12kg ×2 ou KB 16kg"},
{wk:"Optionnel",item:"Longues bandes de traction"}
];

/* ─── STATE ─── */
let phaseIdx=0, sessIdx=0, currentView="home", expandedEx=null;
let done={}, history=[];
let timerSec=0, timerInterval=null;

/* ─── STORAGE ─── */
function loadState(){
  try{done=JSON.parse(localStorage.getItem("gl-done"))||{}}catch{done={}}
  try{history=JSON.parse(localStorage.getItem("gl-history"))||[]}catch{history=[]}
}
function saveDone(){try{localStorage.setItem("gl-done",JSON.stringify(done))}catch{}}
function saveHistory(){try{localStorage.setItem("gl-history",JSON.stringify(history))}catch{}}

/* ─── TIMER ─── */
function startTimer(sec){
  stopTimer();
  timerSec=sec;
  updateTimerDisplay();
  document.getElementById("timerBar").classList.add("active");
  const wkHead=document.getElementById("wkHead");
  if(wkHead)wkHead.classList.add("timer-push");
  timerInterval=setInterval(()=>{
    timerSec--;
    if(timerSec<=0){stopTimer();
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }else updateTimerDisplay();
  },1000);
}
function stopTimer(){
  clearInterval(timerInterval);timerInterval=null;timerSec=0;
  document.getElementById("timerBar").classList.remove("active");
  const wkHead=document.getElementById("wkHead");
  if(wkHead)wkHead.classList.remove("timer-push");
}
function updateTimerDisplay(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  document.getElementById("timerDisplay").textContent=m+":"+String(s).padStart(2,"0");
}

/* ─── VIEWS ─── */
function showView(v){
  currentView=v;expandedEx=null;
  document.querySelectorAll(".view").forEach(el=>el.classList.remove("active"));
  const tabBar=document.getElementById("tabBar");
  const map={home:"viewHome",workout:"viewWorkout",done:"viewDone",prog:"viewProg",info:"viewInfo"};
  document.getElementById(map[v]).classList.add("active");
  // Tab highlighting
  document.querySelectorAll(".tab-bar button").forEach(b=>{
    b.classList.toggle("on",b.dataset.tab===v);
  });
  tabBar.style.display=(v==="done")?"none":"flex";
  // Render
  if(v==="home")renderHome();
  else if(v==="workout")renderWorkout();
  else if(v==="prog")renderProg();
  else if(v==="info")renderInfo();
  window.scrollTo(0,0);
}

/* ─── RENDER HOME ─── */
function renderHome(){
  const pills=document.getElementById("phasePills");
  pills.innerHTML=P.map((p,i)=>{
    const on=phaseIdx===i;
    return `<button class="${on?"on":""}" style="${on?"background:"+p.color+"22;color:"+p.color:""}" onclick="setPhase(${i})">${p.name}</button>`;
  }).join("");
  document.getElementById("phaseWeeks").textContent=P[phaseIdx].wk;
  const grid=document.getElementById("sessGrid");
  const phase=P[phaseIdx];
  grid.innerHTML=phase.sessions.map((s,i)=>{
    const cnt=s.ex.filter((_,j)=>done[s.id+"-"+j]).length;
    const pct=Math.round(cnt/s.ex.length*100);
    const complete=pct===100;
    return `<div class="sess-card" style="${complete?"border-color:"+phase.color+"33;background:"+phase.color+"08":""}" onclick="openSession(${i})">
      <div class="day" style="color:${phase.color}">${s.day}</div>
      <div class="stitle">${s.title}</div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${phase.color}"></div></div>
      <div class="cnt">${cnt}/${s.ex.length}</div>
    </div>`;
  }).join("");
}
function setPhase(i){phaseIdx=i;sessIdx=0;renderHome()}
function openSession(i){sessIdx=i;showView("workout")}

/* ─── RENDER WORKOUT ─── */
function renderWorkout(){
  const phase=P[phaseIdx],sess=phase.sessions[sessIdx];
  const doneCount=sess.ex.filter((_,j)=>done[sess.id+"-"+j]).length;
  document.getElementById("wkTitle").textContent=sess.title;
  document.getElementById("wkSub").textContent=phase.name+" — "+sess.day+" — "+doneCount+"/"+sess.ex.length+" fait"+(doneCount>1?"s":"");
  document.getElementById("wkWarm").innerHTML=`<span class="wi">🔥</span><span>Échauffement 5 min : ${sess.warm}</span>`;
  document.getElementById("finishBtn").style.background=phase.color;
  const list=document.getElementById("exList");
  list.innerHTML=sess.ex.map((ex,i)=>{
    const key=sess.id+"-"+i;
    const isDone=!!done[key];
    const isOpen=expandedEx===i;
    return `<div class="ex-item${isDone?" checked":""}">
      <div class="ex-row">
        <button class="ex-check${isDone?" on":""}" onclick="toggleEx('${key}')">${isDone?"✓":""}</button>
        <div class="ex-info" onclick="toggleExpand(${i})">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-meta">
            <span class="accent">${ex.s}×${ex.r}</span>
            <span>${ex.w}</span>
            ${ex.rest>0?`<span>⏱ ${ex.rest}s</span>`:""}
          </div>
        </div>
      </div>
      <div class="ex-expand${isOpen?" open":""}">
        <div class="ex-tip">💡 ${ex.tip}</div>
        ${ex.rest>0?`<button class="rest-btn" style="background:${phase.color}22;color:${phase.color}" onclick="startTimer(${ex.rest})">⏱ Lancer ${ex.rest}s de repos</button>`:""}
      </div>
    </div>`;
  }).join("");
}
function toggleEx(key){
  done[key]=!done[key];
  if(!done[key])delete done[key];
  saveDone();renderWorkout();
}
function toggleExpand(i){expandedEx=expandedEx===i?null:i;renderWorkout()}

/* ─── FINISH ─── */
function finishSession(){
  const phase=P[phaseIdx],sess=phase.sessions[sessIdx];
  history.unshift({date:new Date().toLocaleDateString("fr-FR"),phase:phase.name,session:sess.title});
  if(history.length>50)history.length=50;
  saveHistory();showView("done");
}
function resetAndHome(){done={};saveDone();showView("home")}

/* ─── RENDER PROGRESSIONS ─── */
function renderProg(){
  document.getElementById("progList").innerHTML=P.map(p=>`
    <div class="prog-phase">
      <div class="prog-phase-title" style="color:${p.color}">${p.name} — ${p.wk}</div>
      ${p.prog.map(pr=>`<div class="prog-item"><div class="prog-dot" style="background:${p.color}"></div>${pr}</div>`).join("")}
    </div>`).join("");
}

/* ─── RENDER INFO ─── */
function renderInfo(){
  let h=`<div class="section-label" style="color:#E8453F">NUTRITION & RÉCUPÉRATION</div>`;
  h+=NUTR.map(n=>`<div class="info-card"><span class="ii">${n.i}</span><div><h4>${n.t}</h4><p>${n.d}</p></div></div>`).join("");
  h+=`<div class="section-label" style="color:#D4782F;margin-top:20px">MATÉRIEL À ACHETER</div>`;
  h+=SHOP.map(s=>`<div class="info-card"><span class="ii">🛒</span><div><h4>${s.wk}</h4><p>${s.item}</p></div></div>`).join("");
  h+=`<div class="section-label" style="color:#9B2335;margin-top:20px">HISTORIQUE</div>`;
  if(!history.length)h+=`<p style="font-size:13px;color:#555">Aucune séance terminée pour le moment.</p>`;
  else h+=history.map(e=>`<div class="hist-item"><span class="hs">${e.session}</span><span class="hd">${e.date}</span></div>`).join("");
  document.getElementById("infoContent").innerHTML=h;
}

/* ─── INIT ─── */
loadState();
showView("home");
</script>
</body>
</html>
