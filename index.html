<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>GLUTELAB — Programme 12 semaines</title>
<link rel="manifest" href="manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;
  --panel:#141414;
  --panel-2:#1f1f1f;
  --line:#2a2a2a;
  --text:#f5f5f1;
  --muted:#a2a2a2;
  --dim:#626262;
  --red:#e50914;
  --red-soft:#b20710;
  --gold:#d79b45;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
body{background:
  radial-gradient(circle at 50% -120px,rgba(229,9,20,.28),transparent 330px),
  linear-gradient(180deg,#090909 0%,#050505 42%,#050505 100%)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-appearance:none}
button:focus-visible{outline:2px solid rgba(255,255,255,.78);outline-offset:2px}
.tab-bar button:focus-visible{outline:none;box-shadow:inset 0 0 0 2px rgba(255,255,255,.7)}
.app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;background:#050505;overflow-x:hidden;box-shadow:0 0 42px rgba(0,0,0,.55)}

/* Vues */
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Accueil style plateforme de streaming */
.home-hero{position:relative;padding:max(40px,env(safe-area-inset-top,40px)) 16px 14px;min-height:252px;display:flex;flex-direction:column;justify-content:flex-end;
  background:
    linear-gradient(180deg,rgba(5,5,5,.08) 0%,rgba(5,5,5,.55) 55%,#050505 100%),
    radial-gradient(circle at 72% 12%,rgba(229,9,20,.5),transparent 170px),
    linear-gradient(135deg,#231013 0%,#0b0b0b 44%,#050505 100%)}
.home-hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.5),transparent 58%);pointer-events:none}
.brand-row,.kicker,.home-hero h1,.home-hero p,.hero-actions,.stat-row{position:relative;z-index:1}
.brand-row{position:absolute;top:max(16px,env(safe-area-inset-top,16px));left:16px;right:16px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:21px;font-weight:800;line-height:1;letter-spacing:0}
.brand span{color:var(--red)}
.week-badge{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:10px;font-weight:800;color:#fff}
.kicker{font-size:10px;font-weight:800;text-transform:uppercase;color:#d7d7d7;margin-bottom:7px}
.home-hero h1{font-size:28px;font-weight:800;line-height:1.05;letter-spacing:0;max-width:330px}
.home-hero p{font-size:12px;color:#d0d0d0;line-height:1.4;margin-top:6px;max-width:330px}
.hero-actions{display:flex;gap:8px;margin-top:14px}
.play-btn,.ghost-btn{height:38px;border-radius:7px;padding:0 15px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
.play-btn{background:#fff;color:#070707}
.ghost-btn{background:rgba(109,109,110,.72);color:#fff}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.stat{background:rgba(20,20,20,.78);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px}
.stat strong{display:block;font-size:15px;font-weight:800}
.stat span{display:block;font-size:10px;color:var(--muted);margin-top:1px}

.week-strip{display:grid;grid-template-columns:38px 1fr 38px;gap:8px;padding:0 16px 12px}
.week-stepper-btn,.week-stepper-label{height:36px;border-radius:999px;border:1px solid #242424;background:#151515}
.week-stepper-btn{font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}
.week-stepper-btn:disabled{opacity:.35;cursor:default}
.week-stepper-label{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.phase-pills::-webkit-scrollbar{display:none}
.row-head{display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px 8px}
.row-title{font-size:16px;font-weight:800}
.row-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:700}

/* Tab Bar */
.tab-bar{position:fixed;bottom:max(10px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  width:calc(100% - 28px);max-width:392px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px;
  background:rgba(18,18,18,.9);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px;z-index:90;--active-index:0;
  box-shadow:0 18px 42px rgba(0,0,0,.58),inset 0 1px 0 rgba(255,255,255,.06)}
.tab-bar:before{content:"";position:absolute;left:5px;top:5px;bottom:5px;width:calc((100% - 20px)/3);
  border-radius:999px;background:#fff;box-shadow:0 8px 22px rgba(0,0,0,.3);opacity:0;pointer-events:none;
  transform:translateX(calc(var(--active-index) * (100% + 5px)));
  transition:transform .24s cubic-bezier(.2,.8,.2,1),opacity .16s ease}
.tab-bar.has-active:before{opacity:1}
.tab-bar button{min-height:48px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;padding:0 8px;font-size:12px;font-weight:800;line-height:1;color:#a2a2a2;white-space:nowrap;
  transition:background-color .2s ease,color .2s ease,box-shadow .2s ease,transform .12s ease}
.tab-bar button:active{transform:scale(.97)}
.tab-bar button.on{background:transparent;color:#050505;box-shadow:none}

/* Header */
.head{padding:max(52px,env(safe-area-inset-top,52px)) 20px 16px}
.head h1{font-size:30px;font-weight:800;letter-spacing:0}
.head h1 span{color:var(--red)}
.head p{font-size:13px;color:var(--muted);margin-top:2px}

/* Phase Pills */
.phase-pills{display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
.phase-pills button{flex:0 0 auto;min-width:96px;height:34px;padding:0 13px;border-radius:999px;font-size:11px;font-weight:800;background:#171717;color:#b7b7b7;transition:all .15s;border:1px solid #272727}
.phase-pills button.on{color:#fff;border-color:transparent}

/* Grille des séances */
.sess-grid{display:flex;flex-direction:column;gap:7px;padding:0 16px 104px}
.sess-card{position:relative;min-height:0;background:#151515;border-radius:8px;padding:10px;cursor:pointer;transition:transform .12s,border-color .12s,background .12s;border:1px solid #252525;overflow:hidden;
  display:grid;grid-template-columns:36px minmax(0,1fr) auto;grid-template-areas:"day title tag" "bar bar bar" "cnt cnt cnt";align-items:center;column-gap:8px}
.sess-card:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(229,9,20,.2),transparent 52%);opacity:.24;pointer-events:none}
.sess-card:active{transform:scale(.98)}
.sess-card .day,.sess-card .stitle,.sess-card .bar,.sess-card .cnt,.sess-card .tag{position:relative;z-index:1}
.sess-card .day{grid-area:day;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0;margin:0}
.sess-card .tag{grid-area:tag;display:inline-flex;padding:5px 7px;border-radius:999px;background:rgba(0,0,0,.45);font-size:9px;font-weight:800;color:#e6e6e6;white-space:nowrap;margin:0}
.sess-card .stitle{grid-area:title;font-size:14px;font-weight:800;line-height:1.15;min-height:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-card .bar{grid-area:bar;margin-top:8px;height:4px;border-radius:999px;background:#343434;overflow:hidden}
.sess-card .bar-fill{height:100%;border-radius:999px;transition:width .3s}
.sess-card .cnt{grid-area:cnt;font-size:10px;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between;gap:8px}

/* Séance */
.workout{padding:0 20px 132px}
.wk-head{padding-top:max(42px,env(safe-area-inset-top,42px));margin-bottom:16px}
.wk-head.timer-push{padding-top:82px}
.back-btn{font-size:13px;color:var(--muted);padding:5px 0;margin-bottom:10px;display:inline-flex;align-items:center;gap:4px}
.wk-head h2{font-size:28px;font-weight:800;line-height:1.08;letter-spacing:0}
.wk-head .sub{font-size:12px;color:var(--muted);margin-top:6px}

.warm-box{background:#151515;border:1px solid #242424;border-radius:8px;padding:12px 14px;margin-bottom:14px;
  font-size:13px;color:#c7c7c7;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.warm-box .wi{font-size:16px;flex-shrink:0}

/* Exercices */
.ex-item{background:#151515;border:1px solid #232323;border-radius:8px;margin-bottom:8px;overflow:hidden;transition:opacity .15s,border-color .15s}
.ex-item.checked{opacity:.62;border-color:#313131}
.ex-row{display:flex;align-items:center;padding:12px;gap:10px}
.ex-check{width:30px;height:30px;border-radius:6px;border:2px solid #3f3f3f;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s;color:transparent}
.ex-check.on{border-color:var(--red);background:var(--red);color:#fff}
.ex-info{flex:1;min-width:0;cursor:pointer}
.ex-name{font-size:14px;font-weight:800;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{display:flex;gap:8px;flex-wrap:wrap}
.ex-meta span{font-size:11px;color:#9b9b9b}
.ex-meta .accent{color:#fff;font-weight:800;background:rgba(229,9,20,.22);padding:1px 5px;border-radius:4px}
.ex-expand{padding:0 12px 12px;border-top:1px solid #242424;display:none}
.ex-expand.open{display:block}
.ex-tip{font-size:13px;color:#c0c0c0;line-height:1.5;padding-top:10px}
.rest-btn{margin-top:10px;padding:9px 14px;border-radius:6px;font-size:12px;font-weight:800;
  display:inline-flex;align-items:center;gap:6px;transition:all .12s}
.rest-btn:active{transform:scale(.97)}

/* Barre du minuteur */
.timer-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(229,9,20,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:10px 20px;z-index:100;display:none;align-items:center;justify-content:space-between}
.timer-bar.active{display:flex}
.timer-bar .tt{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.timer-bar .tl{font-size:12px;font-weight:700;opacity:.85}
.timer-bar .ts{padding:7px 14px;border-radius:6px;background:rgba(0,0,0,.34);font-size:12px;font-weight:800}

/* Bouton de fin */
.finish-btn{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);
  max-width:390px;padding:16px;border-radius:6px;font-size:15px;font-weight:800;text-align:center;z-index:80;box-shadow:0 12px 32px rgba(0,0,0,.45)}
.finish-btn:active{transform:translateX(-50%) scale(.98)}

/* Écran de réussite */
.done-screen{text-align:center;padding:96px 20px 120px}
.done-screen .big{font-size:58px;margin-bottom:16px}
.done-screen h2{font-size:28px;font-weight:800;margin-bottom:8px}
.done-screen p{font-size:14px;color:var(--muted);line-height:1.45;max-width:280px;margin:0 auto}
.done-screen button{margin-top:24px;padding:14px 28px;border-radius:6px;font-size:14px;font-weight:800;background:var(--red);color:#fff}

/* Cartes d'information */
.info-section{padding:0 20px 112px}
.info-card{background:#151515;border:1px solid #232323;border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.info-card .ii{font-size:22px;flex-shrink:0}
.info-card h4{font-size:14px;font-weight:800;margin-bottom:3px}
.info-card p{font-size:12px;color:var(--muted);line-height:1.4}

/* Progressions */
#viewProg .head{padding-bottom:12px}
#viewProg .head p{line-height:1.35}
.prog-section{padding:0 16px 104px}
.prog-summary{background:#151515;border:1px solid #242424;border-radius:8px;padding:12px;margin-bottom:12px}
.prog-summary-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.prog-summary-top strong{display:block;font-size:22px;font-weight:800;line-height:1.05;margin-top:3px}
.prog-summary-top span{font-size:11px;color:var(--muted);font-weight:800}
.prog-summary-count{font-size:12px;font-weight:800;color:#fff;background:rgba(255,255,255,.08);border-radius:999px;padding:6px 9px;white-space:nowrap}
.prog-meter{height:6px;border-radius:999px;background:#343434;overflow:hidden;margin-bottom:9px}
.prog-meter-fill{height:100%;border-radius:999px;transition:width .24s ease}
.prog-quick{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.prog-quick div{background:#0d0d0d;border:1px solid #242424;border-radius:7px;padding:8px 9px;font-size:11px;color:#cfcfcf}
.prog-quick strong{display:block;font-size:13px;color:#fff;margin-bottom:2px}
.prog-week-nav{display:grid;grid-template-columns:38px 1fr 38px;gap:8px;padding:0 0 13px}
.prog-block{margin-bottom:16px}
.prog-block-title{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:8px}
.prog-block-title strong{font-size:14px;font-weight:800}
.prog-block-title span{font-size:10px;color:var(--muted);font-weight:800;text-align:right}
.prog-session{background:#151515;border:1px solid #242424;border-radius:8px;padding:10px;margin-bottom:7px;cursor:pointer;
  transition:transform .12s,border-color .12s,background .12s}
.prog-session:active{transform:scale(.98)}
.prog-session.done{background:linear-gradient(155deg,rgba(229,9,20,.18),#151515)}
.prog-session-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.prog-session-copy{display:grid;grid-template-columns:34px minmax(0,1fr);align-items:center;gap:8px;min-width:0}
.prog-session-day{font-size:10px;font-weight:800;text-transform:uppercase}
.prog-session-name{font-size:13px;font-weight:800;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-session-status{font-size:9px;font-weight:800;color:#fff;background:rgba(0,0,0,.42);border-radius:999px;padding:5px 7px;white-space:nowrap}
.prog-session-bar{height:4px;border-radius:999px;background:#343434;overflow:hidden}
.prog-session-fill{height:100%;border-radius:999px;transition:width .24s ease}
.prog-session-meta{display:flex;gap:10px;margin-top:5px;font-size:10px;color:var(--muted)}
.prog-phase{margin-bottom:10px}
.prog-phase-title{font-size:13px;font-weight:800;margin-bottom:7px}
.prog-item{padding:8px 0;border-bottom:1px solid #1b1b1b;font-size:12px;color:#d8d8d8;line-height:1.32;display:flex;gap:8px;align-items:flex-start}
.prog-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.prog-more{font-size:11px;color:var(--muted);font-weight:800;margin-top:8px}

/* Historique */
.hist-item{padding:12px 14px;background:#151515;border:1px solid #232323;border-radius:8px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.hist-item .hd{font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.hist-item .hs{font-size:13px;font-weight:800}

.section-label{font-size:13px;font-weight:800;margin-bottom:10px}
.wk-label{padding:0 20px;margin-bottom:14px;font-size:12px;color:var(--muted);font-weight:700}
@media (max-width:360px){
  .home-hero h1{font-size:28px}
  .sess-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- BARRE DU MINUTEUR -->
  <div class="timer-bar" id="timerBar">
    <div>
      <div class="tt" id="timerDisplay">0:00</div>
      <div class="tl">Temps de repos</div>
    </div>
    <button class="ts" onclick="stopTimer()">Annuler</button>
  </div>

  <!-- ACCUEIL -->
  <div class="view active" id="viewHome">
    <div class="home-hero">
      <div class="brand-row">
        <div class="brand">GLUTE<span>LAB</span></div>
        <div class="week-badge" id="weekBadge"></div>
      </div>
      <p class="kicker">Programme de 12 semaines</p>
      <h1 id="homeFocusTitle">Séance recommandée</h1>
      <p id="homeFocusSub">Fessiers • Cuisses • Ventre plat</p>
      <div class="hero-actions">
        <button class="play-btn" id="heroPlay" onclick="openSuggestedSession()">▶ Continuer</button>
        <button class="ghost-btn" onclick="showView('prog')">Progrès</button>
      </div>
      <div class="stat-row" id="homeStats"></div>
    </div>
    <div class="week-strip" id="weekStrip"></div>
    <div class="row-head">
      <div>
        <div class="row-title">Phases</div>
        <div class="row-sub" id="phaseWeeks"></div>
      </div>
    </div>
    <div class="phase-pills" id="phasePills"></div>
    <div class="row-head">
      <div>
        <div class="row-title">Séances</div>
        <div class="row-sub" id="sessionWeeks"></div>
      </div>
    </div>
    <div class="sess-grid" id="sessGrid"></div>
  </div>

  <!-- SÉANCE -->
  <div class="view" id="viewWorkout">
    <div class="workout">
      <div class="wk-head" id="wkHead">
        <button class="back-btn" onclick="showView('home')">← Retour</button>
        <h2 id="wkTitle"></h2>
        <div class="sub" id="wkSub"></div>
      </div>
      <div class="warm-box" id="wkWarm"></div>
      <div id="exList"></div>
      <button class="finish-btn" id="finishBtn" onclick="finishSession()">Terminer la séance ✓</button>
    </div>
  </div>

  <!-- RÉUSSITE -->
  <div class="view" id="viewDone">
    <div class="done-screen">
      <div class="big">🎉</div>
      <h2>Bravo !</h2>
      <p>Séance terminée, progression gardée et historique mis à jour.</p>
      <button onclick="resetAndHome()">Retour à l'accueil</button>
    </div>
  </div>

  <!-- PROGRESSIONS -->
  <div class="view" id="viewProg">
    <div class="head"><h1>Progrès</h1><p>Résumé simple de ta semaine</p></div>
    <div class="prog-section" id="progList"></div>
  </div>

  <!-- CONSEILS -->
  <div class="view" id="viewInfo">
    <div class="head"><h1>Conseils</h1><p>Nutrition, récupération et matériel</p></div>
    <div class="info-section" id="infoContent"></div>
  </div>

  <!-- BARRE DE NAVIGATION -->
  <div class="tab-bar" id="tabBar">
    <button onclick="showView('home')" data-tab="home">Séances</button>
    <button onclick="showView('prog')" data-tab="prog">Progrès</button>
    <button onclick="showView('info')" data-tab="info">Conseils</button>
  </div>
</div>

<script>
/* ─── DATA ─── */
const P=[
{id:"p1",name:"Activation",wk:"Sem. 1-4",color:"#E8453F",sessions:[
{id:"a",day:"Lun",title:"Fessiers priorité",warm:"Squats poids du corps, ponts fessiers, ouvertures de hanche élastique 10kg",ex:[
{n:"Poussée de hanches au sol",s:4,r:"15",w:"Haltère 10kg",rest:60,tip:"Serrer les fessiers 2s en haut. Genoux à 90°."},
{n:"Squat sumo",s:3,r:"12",w:"Kettlebell 12kg",rest:60,tip:"Cuisses parallèles au sol. Pointes de pieds vers l'extérieur."},
{n:"Fentes bulgares",s:3,r:"10/jambe",w:"Haltères 2×4kg",rest:60,tip:"Pied arrière sur une chaise. Genou avant derrière les orteils."},
{n:"Coups de pied arrière",s:3,r:"15/jambe",w:"Élastique 10kg",rest:45,tip:"Élastique aux genoux. Contracter 1s en haut."},
{n:"Abduction debout",s:3,r:"20/jambe",w:"Élastique 10kg",rest:45,tip:"Dos droit, mouvement lent et contrôlé."},
{n:"Gainage planche",s:3,r:"30s",w:"—",rest:30,tip:"Corps aligné, serrer abdos et fessiers."}]},
{id:"b",day:"Mar",title:"Cuisses et fessiers",warm:"Montées de genoux, squats latéraux, activation fessiers élastique",ex:[
{n:"Squat avec kettlebell",s:4,r:"12",w:"Kettlebell 12kg",rest:60,tip:"Coudes entre les genoux en bas. Dos droit."},
{n:"Soulevé jambes tendues",s:3,r:"12",w:"Haltères 2×4kg",rest:60,tip:"Sentir l'étirement à l'arrière des cuisses."},

/* ─── ÉTAT ─── */
let phaseIdx=0, sessIdx=0, currentView="home", expandedEx=null;
let currentWeek=1, suggestedSessionIdx=0;
let done={}, history=[], sessionsDone={};
let timerSec=0, timerInterval=null;

/* ─── STOCKAGE LOCAL ─── */
function clampWeek(w){return Math.min(12,Math.max(1,Number(w)||1))}
function phaseForWeek(w){return Math.min(2,Math.floor((clampWeek(w)-1)/4))}
function weekRangeForPhase(i){return `${i*4+1}-${i*4+4}`}
function sessionKeyForWeek(w,sess){return `w${w}-${sess.id}`}
function sessionKey(sess){return sessionKeyForWeek(currentWeek,sess)}
function exerciseKeyForWeek(w,sess,i){return `${sessionKeyForWeek(w,sess)}-${i}`}
function exerciseKey(sess,i){return exerciseKeyForWeek(currentWeek,sess,i)}
function weekIsDone(w){
  const p=P[phaseForWeek(w)];
  return p.sessions.every(s=>sessionsDone[`w${w}-${s.id}`]);
}
function loadState(){
  try{done=JSON.parse(localStorage.getItem("gl-done"))||{}}catch{done={}}
  try{history=JSON.parse(localStorage.getItem("gl-history"))||[]}catch{history=[]}
  try{sessionsDone=JSON.parse(localStorage.getItem("gl-sessions"))||{}}catch{sessionsDone={}}
  try{currentWeek=clampWeek(localStorage.getItem("gl-week")||1)}catch{currentWeek=1}
  phaseIdx=phaseForWeek(currentWeek);
}
function saveDone(){try{localStorage.setItem("gl-done",JSON.stringify(done))}catch{}}
function saveHistory(){try{localStorage.setItem("gl-history",JSON.stringify(history))}catch{}}
function saveSessions(){try{localStorage.setItem("gl-sessions",JSON.stringify(sessionsDone))}catch{}}
function savePrefs(){try{localStorage.setItem("gl-week",String(currentWeek))}catch{}}

/* ─── MINUTEUR ─── */
function startTimer(sec){
  stopTimer();
  timerSec=sec;
  updateTimerDisplay();
  document.getElementById("timerBar").classList.add("active");
  const wkHead=document.getElementById("wkHead");
  if(wkHead)wkHead.classList.add("timer-push");
  timerInterval=setInterval(()=>{
    timerSec--;
    if(timerSec<=0){stopTimer();
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }else updateTimerDisplay();
  },1000);
}
function stopTimer(){
  clearInterval(timerInterval);timerInterval=null;timerSec=0;
  document.getElementById("timerBar").classList.remove("active");
  const wkHead=document.getElementById("wkHead");
  if(wkHead)wkHead.classList.remove("timer-push");
}
function updateTimerDisplay(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  document.getElementById("timerDisplay").textContent=m+":"+String(s).padStart(2,"0");
}

/* ─── VUES ─── */
function showView(v){
  currentView=v;expandedEx=null;
  document.querySelectorAll(".view").forEach(el=>el.classList.remove("active"));
  const tabBar=document.getElementById("tabBar");
  const tabIndex={home:0,prog:1,info:2};
  const map={home:"viewHome",workout:"viewWorkout",done:"viewDone",prog:"viewProg",info:"viewInfo"};
  document.getElementById(map[v]).classList.add("active");
  // Tab highlighting
  document.querySelectorAll(".tab-bar button").forEach(b=>{
    b.classList.toggle("on",b.dataset.tab===v);
  });
  if(tabIndex[v]!==undefined)tabBar.style.setProperty("--active-index",tabIndex[v]);
  tabBar.classList.toggle("has-active",tabIndex[v]!==undefined);
  tabBar.style.display=(v==="done")?"none":"grid";
  // Affichage
  if(v==="home")renderHome();
  else if(v==="workout")renderWorkout();
  else if(v==="prog")renderProg();
  else if(v==="info")renderInfo();
  window.scrollTo(0,0);
}

/* ─── AFFICHAGE ACCUEIL ─── */
function renderHome(){
  phaseIdx=phaseForWeek(currentWeek);
  const phase=P[phaseIdx];
  suggestedSessionIdx=getSuggestedSessionIndex();
  const focus=phase.sessions[suggestedSessionIdx];
  const weekDone=phase.sessions.filter(s=>sessionsDone[sessionKey(s)]).length;
  const totalDone=Object.keys(sessionsDone).length;
  document.getElementById("weekBadge").textContent=`Semaine ${currentWeek}`;
  document.getElementById("homeFocusTitle").textContent=focus.title;
  document.getElementById("homeFocusSub").textContent=`${phase.name} • ${focus.day} • ${focus.ex.length} exercices`;
  document.getElementById("homeStats").innerHTML=`
    <div class="stat"><strong>${currentWeek}/12</strong><span>Semaine active</span></div>
    <div class="stat"><strong>${weekDone}/${phase.sessions.length}</strong><span>Cette semaine</span></div>
    <div class="stat"><strong>${totalDone}</strong><span>Séances terminées</span></div>`;
  document.getElementById("weekStrip").innerHTML=`
    <button class="week-stepper-btn" onclick="shiftWeek(-1)" aria-label="Semaine précédente" ${currentWeek===1?"disabled":""}>‹</button>
    <div class="week-stepper-label">Semaine ${currentWeek}</div>
    <button class="week-stepper-btn" onclick="shiftWeek(1)" aria-label="Semaine suivante" ${currentWeek===12?"disabled":""}>›</button>`;
  const pills=document.getElementById("phasePills");
  pills.innerHTML=P.map((p,i)=>{
    const on=phaseIdx===i;
    return `<button class="${on?"on":""}" style="${on?"background:"+p.color+";color:#fff":"border-color:"+p.color+"55"}" onclick="setPhase(${i})">${p.name}</button>`;
  }).join("");
  document.getElementById("phaseWeeks").textContent=`${phase.wk} • ${phase.name}`;
  document.getElementById("sessionWeeks").textContent=`${phase.sessions.length} séances • Semaine ${currentWeek}`;
  const grid=document.getElementById("sessGrid");
  grid.innerHTML=phase.sessions.map((s,i)=>{
    const complete=!!sessionsDone[sessionKey(s)];
    const cnt=complete?s.ex.length:s.ex.filter((_,j)=>done[exerciseKey(s,j)]).length;
    const pct=Math.round(cnt/s.ex.length*100);
    const badge=complete?"TERMINÉE":`${s.ex.length} exercices`;
    return `<div class="sess-card" style="${complete?"border-color:"+phase.color+";background:linear-gradient(155deg,"+phase.color+"33,#121212)":""}" onclick="openSession(${i})">
      <div class="day" style="color:${phase.color}">${s.day}</div>
      <div class="tag">${badge}</div>
      <div class="stitle">${s.title}</div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${phase.color}"></div></div>
      <div class="cnt"><span>${cnt}/${s.ex.length}</span><span>${pct}%</span></div>
    </div>`;
  }).join("");
}
function getSuggestedSessionIndex(){
  const phase=P[phaseIdx];
  const next=phase.sessions.findIndex(s=>!sessionsDone[sessionKey(s)]);
  return next===-1?0:next;
}
function setWeek(w){currentWeek=clampWeek(w);phaseIdx=phaseForWeek(currentWeek);sessIdx=0;savePrefs();currentView==="prog"?renderProg():renderHome()}
function shiftWeek(delta){setWeek(currentWeek+delta)}
function setPhase(i){phaseIdx=i;currentWeek=i*4+1;sessIdx=0;savePrefs();currentView==="prog"?renderProg():renderHome()}
function openSuggestedSession(){openSession(suggestedSessionIdx)}
function openSession(i){sessIdx=i;showView("workout")}

/* ─── AFFICHAGE SÉANCE ─── */
function renderWorkout(){
  const phase=P[phaseIdx],sess=phase.sessions[sessIdx];
  const doneCount=sessionsDone[sessionKey(sess)]?sess.ex.length:sess.ex.filter((_,j)=>done[exerciseKey(sess,j)]).length;
  document.getElementById("wkTitle").textContent=sess.title;
  document.getElementById("wkSub").textContent=`Semaine ${currentWeek} • ${phase.name} • ${sess.day} • ${doneCount}/${sess.ex.length} faits`;
  document.getElementById("wkWarm").innerHTML=`<span class="wi">🔥</span><span>Échauffement 5 min : ${sess.warm}</span>`;
  document.getElementById("finishBtn").style.background=phase.color;
  document.getElementById("finishBtn").textContent=sessionsDone[sessionKey(sess)]?"Séance enregistrée ✓":"Terminer et enregistrer ✓";
  const list=document.getElementById("exList");
  list.innerHTML=sess.ex.map((ex,i)=>{
    const key=exerciseKey(sess,i);
    const isDone=!!done[key];
    const isOpen=expandedEx===i;
    return `<div class="ex-item${isDone?" checked":""}">
      <div class="ex-row">
        <button class="ex-check${isDone?" on":""}" aria-label="${isDone?"Décocher":"Cocher"} ${ex.n}" onclick="toggleEx('${key}')">${isDone?"✓":""}</button>
        <div class="ex-info" onclick="toggleExpand(${i})">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-meta">
            <span class="accent">${ex.s}×${ex.r}</span>
            <span>${ex.w}</span>
            ${ex.rest>0?`<span>⏱ ${ex.rest}s</span>`:""}
          </div>
        </div>
      </div>
      <div class="ex-expand${isOpen?" open":""}">
        <div class="ex-tip">💡 ${ex.tip}</div>
        ${ex.rest>0?`<button class="rest-btn" style="background:${phase.color}22;color:${phase.color}" onclick="startTimer(${ex.rest})">⏱ Lancer ${ex.rest}s de repos</button>`:""}
      </div>
    </div>`;
  }).join("");
}
function toggleEx(key){
  done[key]=!done[key];
  if(!done[key])delete done[key];
  const sess=P[phaseIdx].sessions[sessIdx];
  const complete=sess.ex.every((_,j)=>done[exerciseKey(sess,j)]);
  if(complete)sessionsDone[sessionKey(sess)]={date:new Date().toISOString()};
  else delete sessionsDone[sessionKey(sess)];
  saveDone();saveSessions();renderWorkout();
}
function toggleExpand(i){expandedEx=expandedEx===i?null:i;renderWorkout()}

/* ─── FIN DE SÉANCE ─── */
function finishSession(){
  const phase=P[phaseIdx],sess=phase.sessions[sessIdx];
  const key=sessionKey(sess);
  sess.ex.forEach((_,j)=>{done[exerciseKey(sess,j)]=true});
  sessionsDone[key]={date:new Date().toISOString(),week:currentWeek,phase:phase.name,session:sess.title};
  history=history.filter(e=>e.key!==key);
  history.unshift({key,date:new Date().toLocaleDateString("fr-FR"),week:currentWeek,phase:phase.name,session:sess.title});
  if(history.length>50)history.length=50;
  saveDone();saveSessions();saveHistory();showView("done");
}
function resetAndHome(){showView("home")}

/* ─── AFFICHAGE PROGRESSIONS ─── */
function renderProg(){
  phaseIdx=phaseForWeek(currentWeek);
  const phase=P[phaseIdx];
  const totalSessions=Array.from({length:12},(_,i)=>P[phaseForWeek(i+1)].sessions.length).reduce((a,b)=>a+b,0);
  const totalDone=Object.keys(sessionsDone).length;
  const programPct=Math.round(totalDone/totalSessions*100);
  const weekSessions=phase.sessions.length;
  const weekDone=phase.sessions.filter(s=>sessionsDone[sessionKey(s)]).length;
  const weekTotalEx=phase.sessions.reduce((sum,s)=>sum+s.ex.length,0);
  const weekDoneEx=phase.sessions.reduce((sum,s)=>sum+(sessionsDone[sessionKey(s)]?s.ex.length:s.ex.filter((_,j)=>done[exerciseKey(s,j)]).length),0);
  const weekPct=Math.round(weekDoneEx/weekTotalEx*100);
  const nextIdx=getSuggestedSessionIndex();
  const visibleGoals=phase.prog.slice(0,3);
  const hiddenGoalCount=phase.prog.length-visibleGoals.length;
  document.getElementById("progList").innerHTML=`
    <div class="prog-summary">
      <div class="prog-summary-top">
        <div>
          <span>Semaine ${currentWeek} • ${phase.name}</span>
          <strong>${weekPct}% terminé</strong>
        </div>
        <div class="prog-summary-count">${weekDone}/${weekSessions}</div>
      </div>
      <div class="prog-meter"><div class="prog-meter-fill" style="width:${weekPct}%;background:${phase.color}"></div></div>
      <div class="prog-quick">
        <div><strong>${weekDoneEx}/${weekTotalEx}</strong>Exercices</div>
        <div><strong>${programPct}%</strong>Programme</div>
      </div>
    </div>
    <div class="prog-week-nav">
      <button class="week-stepper-btn" onclick="shiftWeek(-1)" aria-label="Semaine précédente" ${currentWeek===1?"disabled":""}>‹</button>
      <div class="week-stepper-label">Semaine ${currentWeek}</div>
      <button class="week-stepper-btn" onclick="shiftWeek(1)" aria-label="Semaine suivante" ${currentWeek===12?"disabled":""}>›</button>
    </div>
    <div class="prog-block">
      <div class="prog-block-title">
        <strong>Séances</strong>
        <span>${phase.wk}</span>
      </div>
      ${phase.sessions.map((s,i)=>{
        const complete=!!sessionsDone[sessionKey(s)];
        const cnt=complete?s.ex.length:s.ex.filter((_,j)=>done[exerciseKey(s,j)]).length;
        const pct=Math.round(cnt/s.ex.length*100);
        return `<div class="prog-session${complete?" done":""}" style="${complete?"border-color:"+phase.color:""}" onclick="openSession(${i})">
          <div class="prog-session-top">
            <div class="prog-session-copy">
              <div class="prog-session-day" style="color:${phase.color}">${s.day}</div>
              <div class="prog-session-name">${s.title}</div>
            </div>
            <div class="prog-session-status">${complete?"Terminée":i===nextIdx?"À faire":pct?`${pct}%`:"0%"}</div>
          </div>
          <div class="prog-session-bar"><div class="prog-session-fill" style="width:${pct}%;background:${phase.color}"></div></div>
          <div class="prog-session-meta"><span>${cnt}/${s.ex.length} exercices</span></div>
        </div>`;
      }).join("")}
    </div>
    <div class="prog-block">
      <div class="prog-block-title">
        <strong>Objectifs phase</strong>
        <span>${phase.name}</span>
      </div>
      <div class="prog-phase">
        <div class="prog-phase-title" style="color:${phase.color}">${phase.name} — ${phase.wk}</div>
        ${visibleGoals.map(pr=>`<div class="prog-item"><div class="prog-dot" style="background:${phase.color}"></div>${pr}</div>`).join("")}
        ${hiddenGoalCount>0?`<div class="prog-more">+${hiddenGoalCount} autres objectifs dans cette phase</div>`:""}
      </div>
    </div>`;
}

/* ─── AFFICHAGE CONSEILS ─── */
function renderInfo(){
  let h=`<div class="section-label" style="color:#E8453F">NUTRITION ET RÉCUPÉRATION</div>`;
  h+=NUTR.map(n=>`<div class="info-card"><span class="ii">${n.i}</span><div><h4>${n.t}</h4><p>${n.d}</p></div></div>`).join("");
  h+=`<div class="section-label" style="color:#D4782F;margin-top:20px">MATÉRIEL RECOMMANDÉ</div>`;
  h+=SHOP.map(s=>`<div class="info-card"><span class="ii">🛒</span><div><h4>${s.wk}</h4><p>${s.item}</p></div></div>`).join("");
  h+=`<div class="section-label" style="color:#9B2335;margin-top:20px">HISTORIQUE</div>`;
  if(!history.length)h+=`<p style="font-size:13px;color:#555">Aucune séance terminée pour le moment.</p>`;
  else h+=history.map(e=>`<div class="hist-item"><span class="hs">Sem. ${e.week||"?"} • ${e.session}</span><span class="hd">${e.date}</span></div>`).join("");
  document.getElementById("infoContent").innerHTML=h;
}

/* ─── INITIALISATION ─── */
loadState();
showView("home");
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
